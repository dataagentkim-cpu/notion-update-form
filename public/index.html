<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light dark" />
<title>전략과제 업데이트 입력</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #ffffff;
    --card-bg:      #ffffff;
    --card-border:  rgba(0, 0, 0, 0.10);
    --input-bg:     #ffffff;
    --input-border: rgba(0, 0, 0, 0.18);
    --input-focus:  #2563eb;
    --text-primary: rgba(0, 0, 0, 0.88);
    --text-secondary: rgba(0, 0, 0, 0.55);
    --text-tertiary: rgba(0, 0, 0, 0.40);
    --accent:       #4f46e5;
    --accent-bg:    #eef2ff;
    --success:      #10b981;
    --success-bg:   #d1fae5;
    --danger:       #ef4444;
    --danger-bg:    #fee2e2;
    --required:     #ef4444;
    --badge-bg:     #ede9fe;
    --badge-text:   #6d28d9;
    --primary-bg:   #18181b;
    --primary-text: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:           #1a1a1a;
      --card-bg:      #232323;
      --card-border:  rgba(255, 255, 255, 0.10);
      --input-bg:     #2a2a2a;
      --input-border: rgba(255, 255, 255, 0.15);
      --text-primary: rgba(255, 255, 255, 0.92);
      --text-secondary: rgba(255, 255, 255, 0.58);
      --text-tertiary: rgba(255, 255, 255, 0.40);
      --accent-bg:    rgba(79, 70, 229, 0.2);
      --success-bg:   rgba(16, 185, 129, 0.2);
      --danger-bg:    rgba(239, 68, 68, 0.2);
      --badge-bg:     rgba(109, 40, 217, 0.3);
      --badge-text:   #c4b5fd;
      --primary-bg:   #f4f4f5;
      --primary-text: #18181b;
    }
  }

  html, body {
    background: transparent;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.011em;
  }
  body {
    padding: 16px 14px calc(28px + env(safe-area-inset-bottom));
  }
  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 18px;
  }
  .header-icon {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--card-border);
    background: var(--card-bg);
  }
  .header-text { flex: 1; min-width: 0; }
  .header-title {
    font-size: 19px; font-weight: 700; line-height: 1.3;
    letter-spacing: -0.02em;
    margin-bottom: 2px;
  }
  .header-sub {
    font-size: 12.5px; color: var(--text-secondary);
    line-height: 1.5;
  }

  /* Fields */
  .field { margin-bottom: 14px; }
  .field-label {
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
    font-size: 13px; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .req { color: var(--required); font-weight: 700; }
  .badge {
    display: inline-block;
    padding: 2px 7px;
    background: var(--badge-bg);
    color: var(--badge-text);
    font-size: 10.5px; font-weight: 500;
    border-radius: 10px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 520px) {
    .field-row { grid-template-columns: 1fr 1fr; }
  }

  .input, .textarea, .select {
    width: 100%;
    padding: 12px 13px;
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 9px;
    font-family: inherit;
    /* 16px prevents iOS Safari from zooming on focus */
    font-size: 16px;
    line-height: 1.4;
    color: var(--text-primary);
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .select {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%23888' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round' d='M1 1.5l5 5 5-5'/></svg>");
    background-repeat: no-repeat;
    background-position: right 13px center;
    padding-right: 36px;
  }
  .select:disabled { opacity: 0.55; cursor: not-allowed; }
  .textarea {
    resize: vertical;
    min-height: 130px;
    line-height: 1.55;
  }
  .input:focus, .textarea:focus, .select:focus {
    outline: none;
    border-color: var(--input-focus);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.10);
  }
  .input::placeholder, .textarea::placeholder {
    color: var(--text-tertiary);
  }
  /* Make date input look consistent */
  input[type="date"] {
    min-height: 46px;
  }

  /* Buttons */
  .actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-top: 18px;
  }
  @media (min-width: 520px) {
    .actions { grid-template-columns: auto 1fr auto; }
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    min-height: 46px;
    padding: 0 18px;
    background: var(--card-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px; font-weight: 600;
    color: var(--text-primary);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:hover { border-color: var(--text-secondary); }
  .btn:active { transform: scale(0.985); }
  .btn:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }
  .btn-primary {
    background: var(--primary-bg);
    color: var(--primary-text);
    border-color: var(--primary-bg);
  }
  .btn-primary:hover {
    filter: brightness(1.08);
  }

  /* Status banner */
  .status {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 9px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
  }
  .status.show { display: block; }
  .status-success { background: var(--success-bg); color: var(--success); }
  .status-error   { background: var(--danger-bg);  color: var(--danger); }
  .status-info    { background: var(--accent-bg);  color: var(--accent); }

  .ai-hint {
    font-size: 11px; color: var(--text-tertiary);
    margin-left: 2px;
  }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-icon"></div>
    <div class="header-text">
      <h1 class="header-title">전략과제 업데이트 입력</h1>
      <p class="header-sub">본인의 과제 진행 상황을 빠르게 기록하세요 — Notion DB에 바로 저장됩니다.</p>
    </div>
  </header>

  <form id="updateForm">
    <div class="field-row">
      <div class="field">
        <label class="field-label" for="author">작성자(임원) <span class="req">*</span></label>
        <select id="author" class="select" required disabled>
          <option value="">불러오는 중...</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label" for="date">작성일자</label>
        <input id="date" class="input" type="date"/>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="initiative">전략과제명 <span class="req">*</span></label>
      <select id="initiative" class="select" required disabled>
        <option value="">먼저 작성자를 선택하세요</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label" for="summary">요약 제목 <span class="req">*</span></label>
      <input id="summary" class="input" type="text" required
             placeholder="예) 1분기 PoC 완료 및 2분기 파일럿 계획 확정"
             autocomplete="off"/>
    </div>

    <div class="field">
      <label class="field-label" for="content">
        업데이트 내용 <span class="badge">거친 메모도 가능</span>
      </label>
      <textarea id="content" class="textarea"
                placeholder="예) 저번주에 1차 테스트 돌렸고 정확도 82% 나옴. 데이터팀이랑 추가 피쳐 논의했고 다음달 파일럿 들어갈 예정. 예산 추가 필요할 수도 있음."></textarea>
    </div>

    <div class="actions">
      <button type="button" id="btnAI" class="btn" disabled title="준비 중">✨ AI로 다듬기<span class="ai-hint">(v2)</span></button>
      <button type="submit" id="btnSave" class="btn btn-primary">💾 Notion에 저장</button>
      <button type="button" id="btnReset" class="btn">초기화</button>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </form>
</div>

<script>
  const WORKER_URL = 'https://notion-update-form.dataagentkim.workers.dev';
  const LS_AUTHOR_KEY = 'notion-update-form/last-author-id';

  const $ = (id) => document.getElementById(id);
  const form = $('updateForm');
  const dateInput = $('date');
  const authorSel = $('author');
  const initiativeSel = $('initiative');
  const status = $('status');
  const btnSave = $('btnSave');
  const btnReset = $('btnReset');

  // 작성일자 = 오늘 (로컬)
  const offsetMs = new Date().getTimezoneOffset() * 60000;
  const todayStr = () => new Date(Date.now() - offsetMs).toISOString().slice(0, 10);
  dateInput.value = todayStr();

  let executiveMap = new Map(); // id -> name
  let initiativeMap = new Map(); // id -> name

  function showStatus(message, type) {
    status.textContent = message;
    status.className = 'status show status-' + type;
    if (type === 'success') {
      try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch {}
    }
  }
  function hideStatus() {
    status.className = 'status';
    status.textContent = '';
  }

  function setOptions(select, items, placeholder) {
    const frag = document.createDocumentFragment();
    const ph = document.createElement('option');
    ph.value = '';
    ph.textContent = placeholder;
    frag.appendChild(ph);
    for (const it of items) {
      const opt = document.createElement('option');
      opt.value = it.id;
      opt.textContent = it.name;
      frag.appendChild(opt);
    }
    select.innerHTML = '';
    select.appendChild(frag);
  }

  async function loadExecutives() {
    try {
      const res = await fetch(WORKER_URL + '/api/bootstrap');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('서버 오류 ' + res.status));
      const list = data.executives || [];
      executiveMap = new Map(list.map((e) => [e.id, e.name]));
      setOptions(authorSel, list, '임원을 선택하세요');
      authorSel.disabled = false;

      // 직전에 선택한 임원 복원
      const last = localStorage.getItem(LS_AUTHOR_KEY);
      if (last && executiveMap.has(last)) {
        authorSel.value = last;
        await loadInitiatives(last);
      }
    } catch (err) {
      setOptions(authorSel, [], '임원 로드 실패');
      showStatus('❌ 임원 목록 로드 실패: ' + err.message, 'error');
    }
  }

  async function loadInitiatives(executiveId) {
    if (!executiveId) {
      initiativeMap = new Map();
      setOptions(initiativeSel, [], '먼저 작성자를 선택하세요');
      initiativeSel.disabled = true;
      return;
    }
    initiativeSel.disabled = true;
    setOptions(initiativeSel, [], '불러오는 중...');
    try {
      const res = await fetch(WORKER_URL + '/api/initiatives?executive_id=' + encodeURIComponent(executiveId));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('서버 오류 ' + res.status));
      const list = data.initiatives || [];
      initiativeMap = new Map(list.map((i) => [i.id, i.name]));
      if (list.length === 0) {
        setOptions(initiativeSel, [], '본인 과제가 없습니다');
        initiativeSel.disabled = true;
      } else {
        setOptions(initiativeSel, list, '전략과제를 선택하세요');
        initiativeSel.disabled = false;
      }
    } catch (err) {
      setOptions(initiativeSel, [], '과제 로드 실패');
      initiativeSel.disabled = true;
      showStatus('❌ 전략과제 목록 로드 실패: ' + err.message, 'error');
    }
  }

  authorSel.addEventListener('change', () => {
    const id = authorSel.value;
    if (id) localStorage.setItem(LS_AUTHOR_KEY, id);
    loadInitiatives(id);
  });

  btnReset.addEventListener('click', () => {
    $('summary').value = '';
    $('content').value = '';
    dateInput.value = todayStr();
    hideStatus();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideStatus();
    btnSave.disabled = true;
    const originalText = btnSave.innerHTML;
    btnSave.innerHTML = '⏳ 저장 중...';

    const payload = {
      initiative_id: initiativeSel.value,
      initiative_name: initiativeMap.get(initiativeSel.value) || '',
      author_id: authorSel.value,
      author_name: executiveMap.get(authorSel.value) || '',
      summary: $('summary').value.trim(),
      content: $('content').value.trim(),
      date: dateInput.value,
    };

    try {
      const res = await fetch(WORKER_URL + '/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ('서버 오류 ' + res.status));

      const warnings = (data.warnings || []).join(' / ');
      const msg = '✅ Notion에 저장되었습니다.' + (warnings ? ' (' + warnings + ')' : '');
      showStatus(msg, 'success');

      // Soft-reset: keep 작성자/전략과제 for repeated entries
      $('summary').value = '';
      $('content').value = '';
    } catch (err) {
      showStatus('❌ 저장 실패: ' + err.message, 'error');
    } finally {
      btnSave.disabled = false;
      btnSave.innerHTML = originalText;
    }
  });

  loadExecutives();
</script>
</body>
</html>
