<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<title>전략과제 업데이트 입력</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #ffffff;
    --card-bg:      #ffffff;
    --card-border:  rgba(0, 0, 0, 0.10);
    --input-bg:     #ffffff;
    --input-border: rgba(0, 0, 0, 0.18);
    --input-focus:  #2563eb;
    --text-primary: rgba(0, 0, 0, 0.88);
    --text-secondary: rgba(0, 0, 0, 0.55);
    --text-tertiary: rgba(0, 0, 0, 0.40);
    --accent:       #4f46e5;
    --accent-bg:    #eef2ff;
    --success:      #10b981;
    --success-bg:   #d1fae5;
    --danger:       #ef4444;
    --danger-bg:    #fee2e2;
    --required:     #ef4444;
    --badge-bg:     #ede9fe;
    --badge-text:   #6d28d9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:           #1a1a1a;
      --card-bg:      #232323;
      --card-border:  rgba(255, 255, 255, 0.10);
      --input-bg:     #2a2a2a;
      --input-border: rgba(255, 255, 255, 0.15);
      --text-primary: rgba(255, 255, 255, 0.92);
      --text-secondary: rgba(255, 255, 255, 0.58);
      --text-tertiary: rgba(255, 255, 255, 0.40);
      --accent-bg:    rgba(79, 70, 229, 0.2);
      --success-bg:   rgba(16, 185, 129, 0.2);
      --danger-bg:    rgba(239, 68, 68, 0.2);
      --badge-bg:     rgba(109, 40, 217, 0.3);
      --badge-text:   #c4b5fd;
    }
  }

  body {
    background: transparent;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.011em;
    padding: 24px 20px 36px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 24px;
  }
  .header-icon {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1.5px solid var(--card-border);
    background: var(--card-bg);
  }
  .header-text { flex: 1; }
  .header-title {
    font-size: 22px; font-weight: 700; line-height: 1.3;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .header-sub {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.5;
  }

  /* Fields */
  .field { margin-bottom: 18px; }
  .field-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .req { color: var(--required); font-weight: 700; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    background: var(--badge-bg);
    color: var(--badge-text);
    font-size: 11px; font-weight: 500;
    border-radius: 10px;
  }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .input, .textarea {
    width: 100%;
    padding: 11px 13px;
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text-primary);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .textarea {
    resize: vertical;
    min-height: 120px;
    line-height: 1.55;
  }
  .input:focus, .textarea:focus {
    outline: none;
    border-color: var(--input-focus);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.10);
  }
  .input::placeholder, .textarea::placeholder {
    color: var(--text-tertiary);
  }

  /* Buttons */
  .actions {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-top: 18px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 16px;
    background: var(--card-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px; font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
  }
  .btn:hover { border-color: var(--text-secondary); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }
  .btn-primary {
    background: #18181b;
    color: #ffffff;
    border-color: #18181b;
  }
  .btn-primary:hover { background: #27272a; border-color: #27272a; }
  @media (prefers-color-scheme: dark) {
    .btn-primary {
      background: #f4f4f5;
      color: #18181b;
      border-color: #f4f4f5;
    }
    .btn-primary:hover { background: #e4e4e7; border-color: #e4e4e7; }
  }

  /* Status banner */
  .status {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
  }
  .status.show { display: block; }
  .status-success { background: var(--success-bg); color: var(--success); }
  .status-error   { background: var(--danger-bg);  color: var(--danger); }
  .status-info    { background: var(--accent-bg);  color: var(--accent); }

  /* Hint for AI button when disabled */
  .ai-hint {
    font-size: 11px; color: var(--text-tertiary);
    margin-left: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-icon"></div>
    <div class="header-text">
      <h1 class="header-title">전략과제 업데이트 입력</h1>
      <p class="header-sub">본인의 과제 진행 상황을 빠르게 기록하세요 — Notion DB에 바로 저장됩니다.</p>
    </div>
  </header>

  <form id="updateForm">
    <div class="field">
      <label class="field-label" for="initiative">전략과제명 <span class="req">*</span></label>
      <input id="initiative" class="input" type="text" required
             placeholder="예) AI 기반 언더라이팅 자동화" autocomplete="off"/>
    </div>

    <div class="field">
      <label class="field-label" for="summary">요약 제목 <span class="req">*</span></label>
      <input id="summary" class="input" type="text" required
             placeholder="예) 1분기 PoC 완료 및 2분기 파일럿 계획 확정"/>
    </div>

    <div class="field">
      <label class="field-label" for="content">
        업데이트 내용 <span class="badge">거친 메모도 가능</span>
      </label>
      <textarea id="content" class="textarea"
                placeholder="예) 저번주에 1차 테스트 돌렸고 정확도 82% 나옴. 데이터팀이랑 추가 피쳐 논의했고 다음달 파일럿 들어갈 예정. 예산 추가 필요할 수도 있음."></textarea>
    </div>

    <div class="field-row">
      <div class="field">
        <label class="field-label" for="date">작성일자</label>
        <input id="date" class="input" type="date"/>
      </div>
      <div class="field">
        <label class="field-label" for="author">작성자 <span class="req">*</span></label>
        <input id="author" class="input" type="text" required
               placeholder="예) 김준승" autocomplete="off"/>
      </div>
    </div>

    <div class="actions">
      <button type="button" id="btnAI" class="btn" disabled title="준비 중">✨ AI로 다듬기 <span class="ai-hint">(v2)</span></button>
      <button type="submit" id="btnSave" class="btn btn-primary">💾 Notion에 저장</button>
      <button type="button" id="btnReset" class="btn">초기화</button>
    </div>

    <div id="status" class="status"></div>
  </form>
</div>

<script>
  // Worker endpoint (replace with your deployed URL after Cloudflare deploy)
  // Example: https://notion-update-form.<your-subdomain>.workers.dev
  const WORKER_URL = 'https://notion-update-form.dataagentkim.workers.dev';

  const $ = (id) => document.getElementById(id);
  const form = $('updateForm');
  const dateInput = $('date');
  const status = $('status');
  const btnSave = $('btnSave');
  const btnReset = $('btnReset');

  // Default 작성일자 = today
  dateInput.value = new Date().toISOString().slice(0, 10);

  function showStatus(message, type) {
    status.textContent = message;
    status.className = 'status show status-' + type;
  }
  function hideStatus() {
    status.className = 'status';
    status.textContent = '';
  }

  btnReset.addEventListener('click', () => {
    form.reset();
    dateInput.value = new Date().toISOString().slice(0, 10);
    hideStatus();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideStatus();
    btnSave.disabled = true;
    const originalText = btnSave.innerHTML;
    btnSave.innerHTML = '⏳ 저장 중...';

    const payload = {
      initiative: $('initiative').value.trim(),
      summary: $('summary').value.trim(),
      content: $('content').value.trim(),
      date: dateInput.value,
      author: $('author').value.trim(),
    };

    try {
      const res = await fetch(WORKER_URL + '/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('서버 오류 ' + res.status));

      const warnings = (data.warnings || []).join(' / ');
      const msg = '✅ Notion에 저장되었습니다.' + (warnings ? ' (' + warnings + ')' : '');
      showStatus(msg, 'success');

      // Soft-reset content fields (keep author/initiative for repeated entries)
      $('summary').value = '';
      $('content').value = '';
    } catch (err) {
      showStatus('❌ 저장 실패: ' + err.message, 'error');
    } finally {
      btnSave.disabled = false;
      btnSave.innerHTML = originalText;
    }
  });
</script>
</body>
</html>
